<!doctype html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Login | Orchestrální plánovač</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #e8a800;
            min-height: 100vh;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
        }
        .dev-badge {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 p-md-5" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/hamu_logo.png') }}" alt="HAMU Logo"
                 style="max-height: 60px;">
            <h2 class="mt-3 fw-bold text-dark">Organizátor</h2>
            <span class="badge bg-warning text-dark dev-badge">VÝVOJOVÉ PROSTŘEDÍ</span>
            <p class="text-muted small mt-2">Vyberte uživatele pro přihlášení</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show"
                         role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="form-label fw-semibold">Uživatel</label>
                <select name="user_id" class="form-select" required>
                    <option value="" disabled selected>— Vyberte uživatele —</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">
                            {{ user.display_name or user.email }}
                            ({{ user.role.name if user.role else "bez role" }})
                        </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold">
                Přihlásit se jako vybraný uživatel
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
