<!doctype html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení passkey | Orchestrální plánovač</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        .passkey-icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 p-md-5" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/hamu_logo.png') }}" alt="HAMU Logo"
                 style="max-height: 60px;">
            <h2 class="mt-3 fw-bold text-dark">Administrátorský přístup</h2>
            <p class="text-muted small">Přihlášení pomocí passkey</p>
        </div>

        <div id="status-alert" class="d-none alert" role="alert"></div>

        <button id="btn-login" class="btn btn-dark w-100 fw-semibold py-3 d-flex align-items-center justify-content-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M0 8a4 4 0 0 1 7.465-2H14a.5.5 0 0 1 .354.146l1.5 1.5a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0L13 9.207l-.646.647a.5.5 0 0 1-.708 0L11 9.207l-.646.647a.5.5 0 0 1-.708 0L9 9.207l-.646.647A.5.5 0 0 1 8 10H7.465A4.002 4.002 0 0 1 0 8m4-3a3 3 0 1 0 0 6 3 3 0 0 0 0-6"/>
            </svg>
            Přihlásit se passkey
        </button>

        <div class="text-center mt-4">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">
                Přihlásit se přes Microsoft Entra
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { startAuthentication } from '{{ url_for("static", filename="vendor/simplewebauthn-browser.es.js") }}';

    const btn = document.getElementById('btn-login');
    const alert = document.getElementById('status-alert');

    function showAlert(msg, type) {
        alert.className = `alert alert-${type}`;
        alert.textContent = msg;
        alert.classList.remove('d-none');
    }

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        alert.classList.add('d-none');

        try {
            const beginResp = await fetch('{{ url_for("auth.passkey_login_begin") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            });
            const options = await beginResp.json();

            const assertion = await startAuthentication({ optionsJSON: options });

            const completeResp = await fetch('{{ url_for("auth.passkey_login_complete") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(assertion),
            });
            const result = await completeResp.json();

            if (result.ok) {
                window.location.href = result.redirect;
            } else {
                showAlert(result.error || 'Přihlášení selhalo.', 'danger');
                btn.disabled = false;
            }
        } catch (err) {
            showAlert('Chyba: ' + err.message, 'danger');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
